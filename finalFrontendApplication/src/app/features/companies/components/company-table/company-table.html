

<h1 class="page-title">Companies</h1>
<div class="navButtons">
<button mat-flat-button color="primary" (click)="createCompany()">Add Company</button>
</div>

@if(error()){
    <p>Error loading companies: {{ error() }}</p>
}

<table mat-table [dataSource]="data" class="mat-elevation-z8">


        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef> ID </th>
            <td mat-cell *matCellDef="let company"> {{company.id}} </td>
        </ng-container>


        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Name </th>
            <td mat-cell *matCellDef="let company"> {{company.name}} </td>
        </ng-container>


        <ng-container matColumnDef="address">
            <th mat-header-cell *matHeaderCellDef> Address </th>
            <td mat-cell *matCellDef="let company"> {{company.address}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> Actions </th>
            <td mat-cell *matCellDef="let company">
                <button mat-icon-button color="primary" (click)="updateCompany(company)">
                    <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="deleteCompany(company)">
                    <mat-icon>delete</mat-icon>
                </button>

                <button mat-icon-button color="accent" (click)="viewEmployees(company)">
                    <mat-icon>group</mat-icon>
                </button>
                <button mat-icon-button color="accent" (click)="viewDevices(company)">
                    <mat-icon>devices</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns; trackBy: trackByCompanyId"></tr>
        <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" [colSpan]="columns.length">
                @if(loading()){
                    Loading...
                }@else{
                    No data available
                }
            </td>
        </tr>
    </table>
