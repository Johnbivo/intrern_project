<mat-grid-list cols="3" rowHeight="200px" gutterSize="16px">
  @for (company of companies(); track company.id) {
    <mat-grid-tile>
      <mat-card class="company-card" (click)="selectCompany(company)">
        <mat-card-title>{{ company.name }}</mat-card-title>
        <mat-card-subtitle>{{ company.address }}</mat-card-subtitle>
      </mat-card>
    </mat-grid-tile>
  }
  <mat-grid-tile>
    <mat-card class="company-card unemployed-card" (click)="selectUnemployed()">
      <mat-card-title>Unemployed</mat-card-title>
      <mat-card-subtitle>Employees without a company</mat-card-subtitle>
    </mat-card>
  </mat-grid-tile>
</mat-grid-list>
