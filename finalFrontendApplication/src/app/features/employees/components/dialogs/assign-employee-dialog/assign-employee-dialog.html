<h2 mat-dialog-title>Assign Employee</h2>

<mat-dialog-content>
  <p>Assign <strong>{{ data.employeeName }}</strong> to a company.</p>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Company</mat-label>
    <mat-select [(ngModel)]="selectedCompanyId">
      @for (company of companies(); track company.id) {
        <mat-option [value]="company.id">{{ company.name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="confirm()" [disabled]="!selectedCompanyId">
    Assign
  </button>
</mat-dialog-actions>
