<h2 mat-dialog-title>Update Employee</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline">
    <mat-label>Name</mat-label>
    <input matInput [(ngModel)]="formData.name" placeholder="Employee name" required>
  </mat-form-field>
  <mat-form-field appearance="outline" [class.invalid-email]="showEmailError()">
    <mat-label>Email</mat-label>
    <input matInput [(ngModel)]="formData.email" type="email" placeholder="Employee email" required (input)="markEmailTouched()" (blur)="markEmailTouched()">
    <mat-error *ngIf="showEmailError()">
      Please enter a valid email address.
    </mat-error>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="!canSubmit()">Update</button>
</mat-dialog-actions>
