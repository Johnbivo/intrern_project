
<h2 mat-dialog-title class="dialog-title">Add Device</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Serial Number</mat-label>
    <input matInput [(ngModel)]="formData.serialNumber" name="serialNumber"/>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Name</mat-label>
    <input matInput [(ngModel)]="formData.name" name="name" required />
  </mat-form-field>


<mat-form-field appearance="outline" class="full-width">
    <mat-label>Type</mat-label>
    <input matInput [(ngModel)]="formData.type" name="type" required />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="submit()">Create</button>
</mat-dialog-actions>
